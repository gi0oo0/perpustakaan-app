[phases.setup]
nixPkgs = ["php82", "php82Extensions.curl", "php82Extensions.dom", "php82Extensions.libxml", "php82Extensions.mbstring", "php82Extensions.xml", "php82Extensions.pdo", "php82Extensions.pdo_mysql", "php82Extensions.gd", "php82Extensions.bcmath", "php82Extensions.zip"]

[phases.build]
cmds = ["npm install", "npm run build", "composer install --no-dev --optimize-autoloader"]

[phases.release]
start = "php artisan serve --host=0.0.0.0 --port=$PORT"
